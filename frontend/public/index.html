<!-- frontend/public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web Browser with Rating System - A desktop browser with integrated webpage rating and commenting features">
    <title>Web Browser with Rating System</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/logo192.png">
    
    <!-- Security Headers (simplified) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' http://localhost:5000;">
    
    <!-- Prevent zooming on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <noscript>
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            z-index: 9999;
        ">
            <h1 style="color: #2563eb; margin-bottom: 1rem;">JavaScript Required</h1>
            <p style="margin-bottom: 1.5rem; max-width: 600px;">
                This web browser application requires JavaScript to function properly. 
                Please enable JavaScript in your browser settings to continue.
            </p>
            <div style="
                background-color: white;
                padding: 1.5rem;
                border-radius: 8px;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                max-width: 400px;
            ">
                <h3 style="margin-bottom: 0.5rem;">Alternative Options:</h3>
                <ul style="text-align: left; margin-bottom: 1rem;">
                    <li>Enable JavaScript in your browser settings</li>
                    <li>Use a modern browser that supports JavaScript</li>
                    <li>Contact your system administrator if JavaScript is disabled by policy</li>
                </ul>
                <p style="font-size: 0.875rem; color: #64748b;">
                    This application uses React.js and requires JavaScript to render the interface and handle user interactions.
                </p>
            </div>
        </div>
    </noscript>
    
    <div id="root"></div>
    
    <!-- Loading fallback -->
    <div id="loading-fallback" style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9998;
    ">
        <div style="
            width: 60px;
            height: 60px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        "></div>
        <p style="color: #64748b; font-size: 1rem;">Loading Web Browser...</p>
    </div>
    
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading-fallback {
            display: flex;
        }
        
        #root:not(:empty) + #loading-fallback {
            display: none;
        }
    </style>
    
    <!-- Script will be injected by webpack -->
</body>
</html>
